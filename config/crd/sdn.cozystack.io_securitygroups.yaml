  names:
    kind: SecurityGroup
    listKind: SecurityGroupList
    plural: securitygroups
    singular: securitygroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vpcRef.name
      name: VPC
      type: string
    - jsonPath: .status.id
