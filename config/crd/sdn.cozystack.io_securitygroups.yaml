    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SecurityGroup is intra-VPC network policy, AWS-security-group-shaped: it
          selects member pods by label and admits inbound traffic from other groups (in
          the same VPC) or from north-south CIDRs. While no group selects a pod its
          intra-VPC ingress is unrestricted (today's behavior); once any group selects
          it, its ingress is default-deny, opened only by the union of its groups'
          rules. Enforcement is destination-side in the eBPF datapath, so it is
          placement-independent.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SecurityGroupSpec declares an intra-VPC policy group: which ports are members
              and, for a member, which sources may reach it.
            properties:
              egress:
                description: |-
                  Egress is the list of allowed east-west destinations (the mirror of
                  Ingress). When any group selects a pod, its east-west egress is also
                  default-deny: it may reach another VPC pod only if a group it belongs to
                  admits that pod's group here. A flow is delivered only when both the
                  destination's ingress and the source's egress admit it. `to.cidr`
                  (north-south/external egress) is a later increment.
                items:
                  description: |-
                    SecurityGroupEgressRule admits traffic from the group's members to a
                    destination, optionally narrowed to specific ports.
                  properties:
                    ports:
                      description: |-
                        Ports narrows the rule to specific destination ports. Empty means every
                        port and protocol.
                      items:
                        description: SecurityGroupPort is a protocol/port an ingress
                          rule admits.
                        properties:
                          port:
                            description: |-
                              Port is the destination port. Zero (or omitted) means every port for the
                              protocol.
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol is TCP or UDP.
                            enum:
                            - TCP
                            - UDP
                            type: string
                        required:
                        - protocol
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                    to:
                      description: To is the admitted destination (a group, optionally
                        in a peered VPC).
                      properties:
                        cidr:
                          description: |-
                            CIDR admits north-south (bridge/floating) callers by their pre-masquerade
                            client address. It does not match intra-VPC sources — those are identified
                            by group. FQDN sources are a later increment.
                          type: string
                        group:
                          description: |-
                            Group is the name of another SecurityGroup — in this VPC, or in the VPC
                            named by VPC.
                          type: string
                        vpc:
                          description: |-
                            VPC, when set, makes Group reference a group in that peered VPC (owner
                            namespace + name). The referenced VPC must be a declared peer.
                          properties:
                            name:
                              description: Name is the VPC name within that namespace.
                              type: string
                            namespace:
                              description: Namespace is the namespace that owns the
                                VPC.
                              type: string
                          required:
                          - name
                          - namespace
                          type: object
                      type: object
                  required:
                  - to
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              ingress:
                description: |-
                  Ingress is the list of allowed inbound sources. When *any* group selects a
                  pod, that pod's ingress becomes default-deny and is opened only by the
                  union of the ingress rules of the groups it belongs to.
                items:
                  description: |-
                    SecurityGroupRule admits traffic from one source to the group's members,
                    optionally narrowed to specific ports.
                  properties:
                    from:
                      description: From is the admitted source.
                      properties:
                        cidr:
                          description: |-
                            CIDR admits north-south (bridge/floating) callers by their pre-masquerade
                            client address. It does not match intra-VPC sources — those are identified
                            by group. FQDN sources are a later increment.
                          type: string
                        group:
                          description: |-
                            Group is the name of another SecurityGroup — in this VPC, or in the VPC
                            named by VPC.
                          type: string
                        vpc:
                          description: |-
                            VPC, when set, makes Group reference a group in that peered VPC (owner
                            namespace + name). The referenced VPC must be a declared peer.
                          properties:
                            name:
                              description: Name is the VPC name within that namespace.
                              type: string
                            namespace:
                              description: Namespace is the namespace that owns the
                                VPC.
                              type: string
                          required:
                          - name
                          - namespace
                          type: object
                      type: object
                    ports:
                      description: |-
                        Ports narrows the rule to specific destination ports. Empty means every
                        port and protocol.
                      items:
                        description: SecurityGroupPort is a protocol/port an ingress
                          rule admits.
                        properties:
                          port:
                            description: |-
                              Port is the destination port. Zero (or omitted) means every port for the
                              protocol.
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol is TCP or UDP.
                            enum:
                            - TCP
                            - UDP
                            type: string
                        required:
                        - protocol
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                  required:
                  - from
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              podSelector:
                description: |-
                  PodSelector selects the member pods by their labels (evaluated at Port
                  claim time — see the controller). An empty selector selects every pod in
                  the VPC.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              vpcRef:
                description: |-
                  VPCRef is the local VPC — it lives in the same namespace as this object,
                  like VPCPeering. A group belongs to exactly one VPC.
                properties:
                  name:
                    description: Name is the VPC name within the referring object's
                      namespace.
                    type: string
                required:
