              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VPCPeeringSpec declares one half of a peering between two
              VPCs.
            properties:
              peerRef:
                description: PeerRef is the remote VPC (owner namespace + name).
                properties:
                  name:
                    description: Name is the VPC name within that namespace.
                    type: string
                  namespace:
                    description: Namespace is the namespace that owns the VPC.
                    type: string
                required:
                - name
                - namespace
                type: object
              vpcRef:
                description: VPCRef is the local VPC — it lives in the same namespace
                  as this object.
                properties:
                  name:
                    description: Name is the VPC name within the referring object's
                      namespace.
                    type: string
                required:
                - name
                type: object
            required:
            - peerRef
            - vpcRef
            type: object
            x-kubernetes-validations:
            - message: spec is immutable
              rule: self == oldSelf
          status:
            description: VPCPeeringStatus is the observed state of a VPCPeering.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
