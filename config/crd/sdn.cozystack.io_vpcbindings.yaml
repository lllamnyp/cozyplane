---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: vpcbindings.sdn.cozystack.io
spec:
  group: sdn.cozystack.io
  names:
    kind: VPCBinding
    listKind: VPCBindingList
    plural: vpcbindings
    singular: vpcbinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vpcRef.namespace
      name: VPCNamespace
      type: string
    - jsonPath: .spec.vpcRef.name
      name: VPC
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VPCBinding grants pods in its own (consumer) namespace permission to attach to
          the VPC named in spec.vpcRef. It is created by the VPC owner reaching into the
          consumer namespace (gated by RBAC create here + an export SAR on the VPC), and
          its existence is the namespace-keyed, datapath-readable authorization the CNI
          checks at attach time. A VPC's namespace expresses ownership; a VPCBinding
          expresses use — required even when the pod and VPC share a namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VPCBindingSpec authorizes pods in the binding's (consumer) namespace to attach
              to the referenced VPC.
            properties:
              vpcRef:
                description: VPCRef is the VPC being made usable, identified by owner
                  namespace + name.
                properties:
                  name:
                    description: Name is the VPC name within that namespace.
                    type: string
                  namespace:
                    description: Namespace is the namespace that owns the VPC.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - vpcRef
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
