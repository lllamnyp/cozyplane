---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: ports.sdn.cozystack.io
spec:
  group: sdn.cozystack.io
  names:
    kind: Port
    listKind: PortList
    plural: ports
    singular: port
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vpc
      name: VPC
      type: string
    - jsonPath: .spec.ip
      name: IP
      type: string
    - jsonPath: .spec.node
      name: Node
      type: string
    - jsonPath: .spec.podName
      name: Pod
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Port is a pod's realized interface on a VPC.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PortSpec is the realized network interface of a pod on a VPC.

              A Port is cluster-scoped and its name encodes the VPC and IP
              (<vpc>.<ip-with-dashes>), so creating it is an atomic claim on that IP within
              the VPC — etcd name uniqueness serializes concurrent allocators.
            properties:
              ip:
                description: IP is the address allocated to the pod within the VPC
                  CIDR.
                type: string
              mac:
                description: MAC is the pod interface MAC address.
                type: string
              node:
                description: Node is the name of the node hosting the pod.
                type: string
              nodeIP:
                description: NodeIP is the host IP of that node (the Geneve tunnel
                  endpoint).
                type: string
              podName:
                type: string
              podNamespace:
                description: PodNamespace and PodName identify the owning pod.
                type: string
              vpc:
                description: VPC is the name of the VPC this port belongs to.
                type: string
            required:
            - ip
            - node
            - nodeIP
            - vpc
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
