---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: ports.sdn.cozystack.io
spec:
  group: sdn.cozystack.io
  names:
    kind: Port
    listKind: PortList
    plural: ports
    singular: port
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vpcRef.name
      name: VPC
      type: string
    - jsonPath: .spec.vpcRef.namespace
      name: VPCNamespace
      type: string
    - jsonPath: .spec.ip
      name: IP
      type: string
    - jsonPath: .spec.node
      name: Node
      type: string
    - jsonPath: .spec.podName
      name: Pod
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Port is a pod's realized interface on a VPC.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PortSpec is the realized network interface of a pod on a VPC.

              A Port is cluster-scoped and its name encodes the VPC's VNI and the IP
              (v<vni>.<ip-with-dashes>), so creating it is an atomic claim on that IP within
              the VPC — etcd name uniqueness serializes concurrent allocators. The VNI is
              globally unique, so the name stays unique even though VPCs are namespaced.
            properties:
              fabricIP:
                description: |-
                  FabricIP is the pod's status.podIP: a unique address from the node pod
                  CIDR, reachable on the default overlay, that the bridge DNATs to IP.
                type: string
              gateway:
                description: |-
                  Gateway marks the VPC's gateway port (the .1 leg of the egress gateway
                  pod); agents route off-VPC traffic to it.
                type: boolean
              ip:
                description: |-
                  IP is the address allocated to the pod within the VPC CIDR (the tenant
                  address configured inside the pod).
                type: string
              mac:
                description: MAC is the pod interface MAC address.
                type: string
              node:
                description: Node is the name of the node hosting the pod.
                type: string
              nodeIP:
                description: NodeIP is the host IP of that node (the Geneve tunnel
                  endpoint).
                type: string
              podName:
                type: string
              podNamespace:
                description: PodNamespace and PodName identify the owning pod.
                type: string
              vpcRef:
                description: VPCRef identifies the VPC this port belongs to (owner
                  namespace + name).
                properties:
                  name:
                    description: Name is the VPC name within that namespace.
                    type: string
                  namespace:
                    description: Namespace is the namespace that owns the VPC.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - ip
            - node
            - nodeIP
            - vpcRef
            type: object
          status:
            description: PortStatus is the controller-observed state of a Port.
            properties:
              groups:
                description: |-
                  Groups is the set of SecurityGroup numeric ids (1..63, within the Port's
                  VPC) this Port is a member of, resolved by the controller from the pod's
                  labels. The agent folds it into the datapath membership bitmap. Empty
                  means "no groups" — legacy allow-all intra-VPC ingress.
                items:
                  format: int32
                  type: integer
                type: array
                x-kubernetes-list-type: atomic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
