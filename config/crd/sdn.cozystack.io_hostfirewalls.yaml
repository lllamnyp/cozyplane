kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: hostfirewalls.sdn.cozystack.io
spec:
  group: sdn.cozystack.io
  names:
    kind: HostFirewall
    listKind: HostFirewallList
    plural: hostfirewalls
    singular: hostfirewall
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HostFirewall is a cluster-scoped, operator-owned ingress policy for the
          nodes themselves — the node-scoped sibling of NetworkPolicy (which gates
          default-network pods) and SecurityGroup (which gates VPC ports). Tenants
          get no access to this kind (docs/host-firewall.md).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HostFirewallSpec selects nodes and declares what may reach
              them.
            properties:
              ingress:
                description: Ingress rules union across all HostFirewalls selecting
                  a node.
                items:
                  description: |-
                    HostFirewallRule admits sources to ports. An empty From admits any source;
                    an empty Ports admits every TCP and UDP port.
                  properties:
                    from:
                      description: From lists admitted source ranges. Empty means
                        any source.
                      items:
                        description: HostFirewallPeer is an admitted source range.
                        properties:
                          cidr:
                            description: CIDR admits sources within the range (either
                              family).
                            type: string
                          except:
                            description: Except carves sub-ranges out of CIDR.
                            items:
                              type: string
                            type: array
                        required:
                        - cidr
                        type: object
                      type: array
                    ports:
                      description: |-
                        Ports narrows the rule to specific destination ports. Empty means every
                        port, TCP and UDP.
                      items:
                        description: HostFirewallPort is a protocol/port an ingress
                          rule admits.
                        properties:
                          endPort:
                            description: |-
                              EndPort extends Port to an inclusive range [Port, EndPort]. Ranges
                              expand to per-port datapath entries and are capped at 64 ports
                              (docs/host-firewall.md); wider ranges are rejected (fail closed).
                            format: int32
                            type: integer
                          port:
                            description: |-
                              Port is the destination port. Zero (or omitted) means every port for
                              the protocol.
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol is TCP or UDP.
                            enum:
                            - TCP
                            - UDP
                            type: string
                        required:
                        - protocol
                        type: object
                      type: array
                  type: object
                type: array
              nodeSelector:
                description: |-
                  NodeSelector selects the nodes this firewall applies to by their labels.
                  An empty selector selects every node. A node selected by at least one
                  HostFirewall is host-ingress isolated: new TCP/UDP flows to its
                  addresses are denied unless an ingress rule admits them. Node-sourced
                  traffic, the overlay transport, ICMP, established TCP, and replies to
                  node-originated UDP are never gated (docs/host-firewall.md).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            type: object
          status:
            description: HostFirewallStatus is the observed state of a HostFirewall.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
