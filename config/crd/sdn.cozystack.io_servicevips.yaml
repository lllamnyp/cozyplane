---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servicevips.sdn.cozystack.io
spec:
  group: sdn.cozystack.io
  names:
    kind: ServiceVIP
    listKind: ServiceVIPList
    plural: servicevips
    singular: servicevip
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vpcRef.name
      name: VPC
      type: string
    - jsonPath: .spec.ip
      name: IP
      type: string
    - jsonPath: .spec.serviceRef.name
      name: Service
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ServiceVIP is the ClusterIP-equivalent of a Service inside a VPC: a virtual
          address from the VPC's own space, load-balanced to backend VPC IPs by the
          datapath, discovered only through the split-horizon resolver.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ServiceVIPSpec is the materialized ClusterIP-equivalent of a Service
              attached to a VPC (docs/services-in-vpc.md).

              The controller creates one per attached non-headless Service (the pod->Port
              idiom: the Service carries the sdn.cozystack.io/vpc annotation, the system
              materializes this object). Like a Port, it is cluster-scoped and its name
              encodes the VPC's VNI and the VIP (sv<vni>.<ip-with-dashes>), so creating it
              is an atomic claim on that address among ServiceVIPs; cross-kind uniqueness
              against Ports is enforced by the shared allocator view and the registry (a
              Port always wins a conflict — the VIP is the movable kind, nothing addresses
              it except through a DNS answer).
            properties:
              ip:
                description: IP is the virtual address allocated from the VPC's own
                  address space.
                type: string
              ports:
                description: Ports are the service ports the VIP serves.
                items:
                  description: VIPPort is one service port the VIP serves.
                  properties:
                    name:
                      description: Name of the service port (may be empty for a single
                        unnamed port).
                      type: string
                    port:
                      description: Port is the service port the VIP listens on.
                      format: int32
                      type: integer
                    protocol:
                      description: Protocol is TCP or UDP.
                      type: string
                  required:
                  - port
                  - protocol
                  type: object
                type: array
              serviceRef:
                description: ServiceRef is the Kubernetes Service this VIP fronts.
                properties:
                  name:
                    description: Name of the Service.
                    type: string
                  namespace:
                    description: Namespace of the Service.
                    type: string
                required:
                - name
                - namespace
                type: object
              vpcRef:
                description: VPCRef identifies the VPC this VIP belongs to (owner
                  namespace + name).
                properties:
                  name:
                    description: Name is the VPC name within that namespace.
                    type: string
                  namespace:
                    description: Namespace is the namespace that owns the VPC.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - ip
            - serviceRef
            - vpcRef
            type: object
          status:
            description: ServiceVIPStatus is the observed state of a ServiceVIP.
            properties:
              backends:
                description: |-
                  Backends are the ready endpoints resolved to same-VPC Port addresses;
                  the agents program the datapath from this list.
                items:
                  description: |-
                    VIPBackend is one ready backend of the service, resolved to its Port's VPC
                    address.
                  properties:
                    ip:
                      description: IP is the backend's VPC IP (never the fabric IP).
                      type: string
                    ports:
                      description: Ports are the resolved per-port targets on this
                        backend.
                      items:
                        description: |-
                          VIPBackendPort is one resolved (service port -> target port) pair on a
                          backend.
                        properties:
                          port:
                            description: Port is the service port on the VIP.
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol is TCP or UDP.
                            type: string
                          targetPort:
                            description: TargetPort is the resolved numeric port on
                              the backend.
                            format: int32
                            type: integer
                        required:
                        - port
                        - protocol
                        - targetPort
                        type: object
                      type: array
                  required:
                  - ip
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Ready
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
