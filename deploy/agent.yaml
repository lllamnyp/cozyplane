---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-agent
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-agent
rules:
  # The agent learns remote pod CIDRs from Node objects only.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-agent
subjects:
  - kind: ServiceAccount
    name: cozyplane-agent
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cozyplane-agent
  namespace: kube-system
  labels:
    app: cozyplane-agent
spec:
  selector:
    matchLabels:
      app: cozyplane-agent
  template:
    metadata:
      labels:
        app: cozyplane-agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: cozyplane-agent
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      initContainers:
        # Install the CNI binaries onto the host before the agent advertises CNI.
        - name: install-cni
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - cp -f /opt/cni/bin/cozyplane /opt/cni/bin/host-local /opt/cni/bin/loopback /host/opt/cni/bin/
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
      containers:
        - name: agent
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          args: ["--mtu=1450"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: cni-conf
              mountPath: /etc/cni/net.d
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: run
              mountPath: /run/cozyplane
            - name: cni-cache
              mountPath: /var/lib/cni
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: run
          hostPath:
            path: /run/cozyplane
            type: DirectoryOrCreate
        - name: cni-cache
          hostPath:
            path: /var/lib/cni
            type: DirectoryOrCreate
