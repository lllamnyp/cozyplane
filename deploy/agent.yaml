---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-agent
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-agent
rules:
  # The agent learns remote pod CIDRs from Node objects.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # The plugin (using this SA) reads pod annotations to resolve VPC membership;
  # the agent's NetworkPolicy compiler watches pods for identities/membership
  # (docs/network-policy.md).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Namespace labels resolve namespaceSelector peers; NetworkPolicies are the
  # net-0 policy source (docs/network-policy.md).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  # Tenant network ids from VPC objects (namespaced; read across all namespaces).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs"]
    verbs: ["get", "list", "watch"]
  # VPCBindings authorize attachment; the plugin checks them at CNI ADD
  # (default-deny) and the agent will watch them for revocation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcbindings"]
    verbs: ["get", "list", "watch"]
  # VPCPeering halves: the agent programs the peers map from mutually-matched
  # specs (not status), so it only needs to observe them.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings"]
    verbs: ["get", "list", "watch"]
  # Port claims (the plugin allocates/releases; the agent watches for remotes,
  # releases the sever finalizer on terminating Ports, and patches spec.node to
  # itself when a migrated guest announces on this node — stage-3 cutover).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["securitygroups"]
    verbs: ["get", "list", "watch"]
  # FabricIPs: the CNI plugin claims and releases underlay addresses through
  # this SA (the agent writes its kubeconfig), and the agent watches them.
  - apiGroups: ["local.sdn.cozystack.io"]
    resources: ["fabricips"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # HostFirewalls: the agent compiles the objects selecting its node into the
  # hf_allow map and arms enforcement (docs/host-firewall.md).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["hostfirewalls"]
    verbs: ["get", "list", "watch"]
  # FloatingIPs: the agent programs the floating map and advertises the address
  # for those whose target Port is on this node.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["floatingips"]
    verbs: ["get", "list", "watch"]
  # ExternalPools: the agent ensures the datapath serves every pool's link on
  # every node — LB/NodePort frontends arrive wherever the provider attracts
  # them, and a DSR reply must leave by that link (docs/lb-ingress.md).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["externalpools"]
    verbs: ["get", "list", "watch"]
  # ServiceVIPs: the agent programs the svc_vips datapath map from them, the
  # resolver answers attached ClusterIP services with the VIP, and the CNI
  # plugin counts them as used addresses when claiming a Port IP.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["servicevips"]
    verbs: ["get", "list", "watch"]
  # The split-horizon resolver (responder container) answers headless Services
  # annotated into a VPC from their EndpointSlices; the agent reads the
  # kube-system/kube-dns Service to discover the cluster DNS address.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-agent
subjects:
  - kind: ServiceAccount
    name: cozyplane-agent
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cozyplane-agent
  namespace: kube-system
  labels:
    app: cozyplane-agent
spec:
  selector:
    matchLabels:
      app: cozyplane-agent
  template:
    metadata:
      labels:
        app: cozyplane-agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: cozyplane-agent
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      initContainers:
        # Install the CNI binaries onto the host before the agent advertises CNI.
        - name: install-cni
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - cp -f /opt/cni/bin/cozyplane /opt/cni/bin/host-local /opt/cni/bin/loopback /host/opt/cni/bin/
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
      containers:
        - name: agent
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          # --cluster-cidr enables node masquerade: pod traffic leaving the
          # cluster is SNATed to the node (pods get an internet return path).
          args: ["--mtu=1450", "--cluster-cidr=10.244.0.0/16,fd00:10:244::/56", "--internal-cidrs=10.244.0.0/16,10.96.0.0/16,fd00:10:244::/56,fd00:10:96::/112"]
          ports:
            # Per-VPC traffic metrics (#2), Prometheus text at /metrics.
            - name: metrics
              containerPort: 9411
              hostPort: 9411
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Gateway-attach is honored only for pods in the agent's namespace.
            - name: AGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            privileged: true
          volumeMounts:
            - name: cni-conf
              mountPath: /etc/cni/net.d
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: run
              mountPath: /run/cozyplane
            - name: cni-cache
              mountPath: /var/lib/cni
        # The split-horizon DNS resolver for VPC pods (docs/services-in-vpc.md).
        # Unprivileged: a DNS socket on the node address (reserved port 15353,
        # reached only via the datapath's steering) and informers.
        - name: responder
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/cozyplane-responder"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # CLUSTER_DOMAIN is autodetected from the kubelet-written search
            # path (dnsPolicy: ClusterFirstWithHostNet); set it to override.
            # Forward external names to the node's own upstreams, not the
            # cluster DNS the pod-level dnsPolicy would hand us.
            - name: RESOLV_CONF
              value: /host/etc/resolv.conf
          volumeMounts:
            - name: host-resolv
              mountPath: /host/etc/resolv.conf
              readOnly: true
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: run
          hostPath:
            path: /run/cozyplane
            type: DirectoryOrCreate
        - name: cni-cache
          hostPath:
            path: /var/lib/cni
            type: DirectoryOrCreate
        - name: host-resolv
          hostPath:
            path: /etc/resolv.conf
            type: File
