---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-controller
rules:
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs/status"]
    verbs: ["get", "update", "patch"]
  # VPCBindings: maintain the reap finalizer and reap Ports on revocation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcbindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Ports: reap on revocation; PortGC releases the sever finalizer when the
  # port's node is gone (needs nodes read).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # VPCPeerings: surface matched/ready in status (observability only; the
  # agents key the datapath on the halves' specs).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings/status"]
    verbs: ["get", "update", "patch"]
  # FloatingIPs: allocate an address from a pool and gate readiness on a live
  # target Port (needs ExternalPools + Ports read; Ports granted above).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["floatingips"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["floatingips/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["externalpools"]
    verbs: ["get", "list", "watch"]
  # ServiceVIPs: materialize one per attached Service, allocate the VIP,
  # resolve backends from Services/EndpointSlices (services-in-vpc.md).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["servicevips"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["servicevips/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Egress gateway Deployments (spec.egress.natGateway -> per-VPC gateway pod).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Severed-gateway heal: recreate a Ready gateway pod whose .1 Port is gone.
  # watch: the persistent-Port controller watches virt-launcher pods to drive
  # live-migration cutover (kubevirt.io/nodeName) and GC.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-controller
subjects:
  - kind: ServiceAccount
    name: cozyplane-controller
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozyplane-controller
  namespace: kube-system
  labels:
    app: cozyplane-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cozyplane-controller
  template:
    metadata:
      labels:
        app: cozyplane-controller
    spec:
      serviceAccountName: cozyplane-controller
      priorityClassName: system-cluster-critical
      containers:
        - name: controller
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sdn-controller"]
          args:
            - --leader-elect=false
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
            - --gateway-image=ghcr.io/lllamnyp/cozyplane:dev
            - --internal-cidrs=10.244.0.0/16,10.96.0.0/16,fd00:10:244::/56,fd00:10:96::/112
            - --cluster-dns=10.96.0.10
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
