---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-controller
rules:
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs/status"]
    verbs: ["get", "update", "patch"]
  # VPCBindings: maintain the reap finalizer and reap Ports on revocation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcbindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports"]
    verbs: ["get", "list", "delete"]
  # VPCPeerings: surface matched/ready in status (observability only; the
  # agents key the datapath on the halves' specs).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings/status"]
    verbs: ["get", "update", "patch"]
  # Egress gateway Deployments (spec.egress.natGateway -> per-VPC gateway pod).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Severed-gateway heal: recreate a Ready gateway pod whose .1 Port is gone.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-controller
subjects:
  - kind: ServiceAccount
    name: cozyplane-controller
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozyplane-controller
  namespace: kube-system
  labels:
    app: cozyplane-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cozyplane-controller
  template:
    metadata:
      labels:
        app: cozyplane-controller
    spec:
      serviceAccountName: cozyplane-controller
      priorityClassName: system-cluster-critical
      containers:
        - name: controller
          image: ghcr.io/lllamnyp/cozyplane:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sdn-controller"]
          args:
            - --leader-elect=false
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
            - --gateway-image=ghcr.io/lllamnyp/cozyplane:dev
            - --internal-cidrs=10.244.0.0/16,10.96.0.0/16
            - --cluster-dns=10.96.0.10
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
