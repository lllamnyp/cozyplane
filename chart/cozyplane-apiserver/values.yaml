# Container image (shared with the cozyplane chart — the apiserver binary lives
# in the same image). Digest-pinned (no floating tag); update on each published
# build.
image: ghcr.io/lllamnyp/cozyplane@sha256:0cdf0db33704f7fe36c9e304c376165ba93e5729180d267e960b36815fdc7a20
imagePullPolicy: IfNotPresent
imagePullSecrets: []

replicas: 1
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

etcd:
  # Operator-managed etcd (aenix etcd-operator; Cozystack ships it):
  # replicated, PVC-backed, TLS end to end. The production path — without it
  # the built-in single-pod etcd below is used, and with its default
  # emptyDir storage a single pod reschedule erases every sdn.cozystack.io
  # object in the cluster.
  operator:
    enabled: false
    replicas: 3
    size: 4Gi
    # StorageClass for the members' PVCs ("" = cluster default).
    storageClass: ""
  # Built-in single-pod etcd (dev/evaluation only).
  image: registry.k8s.io/etcd:3.5.16-0
  # Storage for the built-in etcd. The default is ephemeral (emptyDir); use a
  # persistentVolumeClaim volume source to survive a pod restart.
  storage:
    emptyDir: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
