---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-controller
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs/status"]
    verbs: ["get", "update", "patch"]
  # VPCBindings: maintain the reap finalizer and reap Ports on revocation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcbindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-controller
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-controller
subjects:
  - kind: ServiceAccount
    name: cozyplane-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozyplane-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: cozyplane-controller
    {{- include "cozyplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: cozyplane-controller
  template:
    metadata:
      labels:
        app: cozyplane-controller
    spec:
      serviceAccountName: cozyplane-controller
      priorityClassName: {{ .Values.controller.priorityClassName }}
      {{- include "cozyplane.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: controller
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/sdn-controller"]
          args: ["--leader-elect=false", "--metrics-bind-address=0", "--health-probe-bind-address=:8081"]
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
