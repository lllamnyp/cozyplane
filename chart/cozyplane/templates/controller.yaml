---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-controller
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcs/status"]
    verbs: ["get", "update", "patch"]
  # VPCBindings: maintain the reap finalizer and reap Ports on revocation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcbindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Ports: reap on revocation; PortGC releases the sever finalizer when the
  # port's node is gone (needs nodes read).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  # Port membership (SecurityGroup resolution) is written to ports/status.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["ports/status"]
    verbs: ["get", "update", "patch"]
  # SecurityGroups: id allocation (status) + selector evaluation.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["securitygroups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["securitygroups/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # VPCGateways: a VPC's north-south boundary (docs/north-south.md). The
  # controller owns their status (VPC/pool resolution, one-per-VPC) and reads
  # them to decide whether to realize the gateway pod.
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcgateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcgateways/status"]
    verbs: ["get", "update", "patch"]
  # VPCPeerings: surface matched/ready in status (observability only; the
  # agents key the datapath on the halves' specs).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["vpcpeerings/status"]
    verbs: ["get", "update", "patch"]
  # FloatingIPs: allocate an address from a pool and gate readiness on a live
  # target Port (needs ExternalPools + Ports read, already granted above).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["floatingips"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["floatingips/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["externalpools"]
    verbs: ["get", "list", "watch"]
  # ServiceVIPs: materialize one per attached Service, allocate the VIP,
  # resolve backends from Services/EndpointSlices (services-in-vpc.md).
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["servicevips"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["sdn.cozystack.io"]
    resources: ["servicevips/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # VirtualMachineInstances: the migration controller reads status.nodeName /
  # status.migrationState as the cutover signal (the Kube-OVN model). Optional —
  # only present when KubeVirt is installed; the controller degrades to the
  # launcher-pod signal without it.
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list", "watch"]
  # Egress gateway Deployments (spec.egress.natGateway -> per-VPC gateway pod).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Severed-gateway heal: recreate a Ready gateway pod whose .1 Port is gone.
  # watch: the persistent-Port controller watches virt-launcher pods to drive
  # live-migration cutover (kubevirt.io/nodeName) and GC.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  # FabricIPs: the controller reclaims an underlay address whose pod is gone —
  # the GC the host-local file store never had.
  - apiGroups: ["local.sdn.cozystack.io"]
    resources: ["fabricips"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-controller
  labels:
    {{- include "cozyplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-controller
subjects:
  - kind: ServiceAccount
    name: cozyplane-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozyplane-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: cozyplane-controller
    {{- include "cozyplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: cozyplane-controller
  template:
    metadata:
      labels:
        app: cozyplane-controller
    spec:
      serviceAccountName: cozyplane-controller
      priorityClassName: {{ .Values.controller.priorityClassName }}
      {{- include "cozyplane.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: controller
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/sdn-controller"]
          args:
            - --leader-elect=false
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
            {{- if .Values.egress.clusterCIDR }}
            - --gateway-image={{ .Values.image }}
            - --internal-cidrs={{ concat (list .Values.egress.clusterCIDR .Values.egress.serviceCIDR) .Values.egress.internalCIDRs | compact | join "," }}
            {{- with .Values.egress.clusterDNS }}
            - --cluster-dns={{ . }}
            {{- end }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
