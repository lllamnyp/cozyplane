{{- /* The CRDs of the LOCAL group (local.sdn.cozystack.io) — the layer whose
       dependency floor is the kube API and nothing else: underlay IPAM, which
       must work before cert-manager, before etcd, and before cozyplane's own
       aggregated apiserver (all of which are default-network pods).

       The TENANT kinds (VPC, Port, SecurityGroup, HostFirewall, ...) are NOT
       here and never will be: they are served only by the aggregated apiserver
       (chart/cozyplane-apiserver). One group served by two mechanisms makes the
       kube-apiserver's OpenAPI merge collide on duplicated paths, and the
       group's schema then never serves — which breaks `kubectl apply` for every
       object in it while core types keep working. See docs/api-groups.md. */ -}}
{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fabricips.local.sdn.cozystack.io
spec:
  group: local.sdn.cozystack.io
  names:
    kind: FabricIP
    listKind: FabricIPList
    plural: fabricips
    shortNames:
    - fip
    singular: fabricip
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.address
      name: Address
      type: string
    - jsonPath: .spec.node
      name: Node
      type: string
    - jsonPath: .spec.podName
      name: Pod
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FabricIP is a claim on one underlay address — the cluster-wide, API-backed
          replacement for the `host-local` IPAM plugin's per-node file store
          (docs/api-groups.md).

          The file store it replaces is released only by a CNI DEL, so a pod that
          disappears while kubelet is down leaks its address across the reboot, with no
          GC and no way to tell a live reservation from a ghost. A FabricIP is an
          object: the controller reaps it when its pod is gone, `kubectl get fabricips`
          shows who holds what, and the claim is atomic because the name IS the address.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FabricIPSpec records who holds an underlay address.
            properties:
              address:
                description: |-
                  Address is the canonical address this object claims (the name is its
                  escaped form). This is the underlay identity of a pod: `status.podIP` for
                  a default-network pod, and the fabric handle of a VPC pod.
                type: string
              node:
                description: |-
                  Node is the node the claiming pod runs on. Informational for a flat pool
                  (delivery keys on the address, not the node), but it is what makes a
                  stranded address diagnosable.
                type: string
              podName:
                type: string
              podNamespace:
                description: |-
                  PodNamespace, PodName and PodUID identify the claimant. The UID is the
                  load-bearing one: GC keys on it, so a pod that reuses a name can never
                  have its address reaped by the previous occupant's DEL.
                type: string
              podUID:
                type: string
            required:
            - address
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
{{- end }}
