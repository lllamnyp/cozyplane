name: release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Digest-reproducible (#4): no provenance/SBOM attestation manifests (they
      # embed run metadata and land in the index, changing its digest every
      # run), and rewrite-timestamp + SOURCE_DATE_EPOCH pin layer mtimes and the
      # image-config timestamps, so the same source tree always produces the
      # same index digest. Labels from metadata-action are dropped for the same
      # reason (they embed the run's revision/created timestamps).
      - id: build
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          outputs: type=image,rewrite-timestamp=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The chart pins the image by digest; surface it so it's a copy-paste away.
      - name: report digest
        run: |
          {
            echo "## cozyplane image"
            echo ""
            echo "\`\`\`"
            echo "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
            echo "\`\`\`"
            echo ""
            echo "Pin it in \`chart/cozyplane/values.yaml\` (\`image:\`)."
          } >> "$GITHUB_STEP_SUMMARY"
